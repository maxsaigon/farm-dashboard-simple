<body class="bg-black text-on-secondary h-full overflow-hidden font-body-base antialiased">
<!-- Camera Viewfinder Background -->
<div class="absolute inset-0 z-0">
<img alt="Durian tree orchard view through a camera lens" class="w-full h-full object-cover opacity-90" data-alt="A first-person point-of-view shot looking through a smartphone camera viewfinder at a lush durian orchard in bright daylight. The focus is on a specific, healthy durian tree trunk and its surrounding foliage, capturing the rugged, organic texture of the farm environment. The lighting is harsh outdoor sunlight, casting strong shadows, typical of tropical agricultural settings. The image should convey a sense of high-utility field work." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAjjiWbncFrGIt6QBH8a2sZ4TgM-rOdnYmrKZGrgZvEhjQQ_F2YTWaNPJmgIbfyUQ10Tu6_ij1MH2W5UfhLb2ORrVsYjUWvLDL0C3XUno8SSm2pxc8ZcXBTfZjMsNmEaHgjb12ZpdBG11tXc4XFqUbiCl_DeryGEVw9_d95ubEkYR2YB3CK-7o6rbLNl6SoVlKaxA6O0sppwaC43XVZ7r8AVhXfyeVFvTAMkts0J6Okqshirq2Ys2kXHEX9_DS-atO5EN4ihWcczXxq"/>
<!-- Viewfinder Overlay Elements -->
<div class="absolute inset-0 border-[1px] border-white/20 m-4 rounded-xl flex items-center justify-center pointer-events-none">
<!-- Center Focus Reticle -->
<div class="w-24 h-24 border-2 border-primary-fixed border-dashed rounded-lg opacity-80 animate-pulse"></div>
<!-- Corner Brackets -->
<div class="absolute top-8 left-8 w-8 h-8 border-t-2 border-l-2 border-white/50"></div>
<div class="absolute top-8 right-8 w-8 h-8 border-t-2 border-r-2 border-white/50"></div>
<div class="absolute bottom-8 left-8 w-8 h-8 border-b-2 border-l-2 border-white/50"></div>
<div class="absolute bottom-8 right-8 w-8 h-8 border-b-2 border-r-2 border-white/50"></div>
</div>
</div>
<!-- Top Controls Area -->
<div class="absolute top-0 w-full z-10 bg-gradient-to-b from-black/60 to-transparent pt-safe-area-top pb-6 px-margin-mobile flex justify-between items-start">
<button class="flex items-center justify-center w-touch-target h-touch-target rounded-full bg-black/40 backdrop-blur-md text-white hover:bg-black/60 transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<!-- Contextual Info Badge -->
<div class="bg-black/50 backdrop-blur-md rounded-full px-4 py-2 mt-2 border border-white/10 flex items-center gap-2 shadow-lg">
<span class="material-symbols-outlined text-primary-fixed-dim text-[18px]" style="font-variation-settings: 'FILL' 1;">park</span>
<span class="font-label-md text-label-md text-white">Cây gần nhất: Ri6-001 (8m)</span>
</div>
<button class="flex items-center justify-center w-touch-target h-touch-target rounded-full bg-black/40 backdrop-blur-md text-white hover:bg-black/60 transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">flash_off</span>
</button>
</div>
<!-- Bottom Controls Area -->
<div class="absolute bottom-0 w-full z-10 bg-gradient-to-t from-black via-black/80 to-transparent pb-safe-area-bottom pt-12 px-margin-mobile flex flex-col items-center gap-stack-lg">
<!-- AI Photo Mode Selector -->
<div class="flex bg-black/60 backdrop-blur-md rounded-full p-1 border border-white/10 w-full max-w-sm overflow-x-auto snap-x hide-scrollbar">
<button class="flex-1 min-w-max px-4 py-2 rounded-full font-label-md text-label-md text-white hover:bg-white/10 transition-colors snap-center" type="button">
                Tổng quan
            </button>
<button class="flex-1 min-w-max px-4 py-2 rounded-full font-label-md text-label-md bg-primary text-on-primary shadow-md snap-center" type="button">
                Sức khỏe
            </button>
<button class="flex-1 min-w-max px-4 py-2 rounded-full font-label-md text-label-md text-white hover:bg-white/10 transition-colors snap-center" type="button">
                Đếm trái
            </button>
</div>
<!-- Primary Camera Actions -->
<div class="flex items-center justify-between w-full max-w-sm mb-4">
<!-- Gallery / Last Photo Thumbnail -->
<button class="w-12 h-12 rounded-lg bg-surface-container-high border border-white/20 overflow-hidden flex-shrink-0" type="button">
<div class="w-full h-full bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">photo_library</span>
</div>
</button>
<!-- Main Shutter Button -->
<button class="relative flex items-center justify-center w-20 h-20 rounded-full border-4 border-white focus:outline-none focus:ring-4 focus:ring-primary-fixed/50 transition-transform active:scale-95 group" type="button">
<div class="w-16 h-16 rounded-full bg-white group-active:bg-surface-variant transition-colors"></div>
</button>
<!-- Switch Camera Button -->
<button class="flex items-center justify-center w-12 h-12 rounded-full bg-black/40 backdrop-blur-md text-white hover:bg-black/60 transition-colors flex-shrink-0" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">cameraswitch</span>
</button>
</div>
</div>
<style>
        /* Utility to hide scrollbar but keep functionality for horizontal scroll */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
