<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng nhập - ReNEW Farm Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#191c1e",
                        "status-warning": "#f97316",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#68dba9",
                        "secondary-container": "#d5e3fc",
                        "tertiary-container": "#a36700",
                        "on-primary-fixed": "#002114",
                        "on-tertiary-fixed": "#2a1700",
                        "inverse-on-surface": "#eff1f3",
                        "on-surface": "#191c1e",
                        "outline": "#6d7a72",
                        "tertiary-fixed-dim": "#ffb95f",
                        "tertiary-fixed": "#ffddb8",
                        "primary": "#006948",
                        "on-secondary-fixed-variant": "#3a485b",
                        "secondary-fixed": "#d5e3fc",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e0e3e5",
                        "primary-fixed": "#85f8c4",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#00855d",
                        "tertiary": "#825100",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#68dba9",
                        "info-blue": "#3b82f6",
                        "surface-bright": "#f7f9fb",
                        "secondary": "#515f74",
                        "on-primary-fixed-variant": "#005137",
                        "background": "#f7f9fb",
                        "on-secondary-container": "#57657a",
                        "secondary-fixed-dim": "#b9c7df",
                        "inverse-surface": "#2d3133",
                        "status-error": "#ef4444",
                        "surface-dim": "#d8dadc",
                        "on-secondary-fixed": "#0d1c2e",
                        "surface-container-high": "#e6e8ea",
                        "surface-container": "#eceef0",
                        "on-surface-variant": "#3d4a42",
                        "on-error": "#ffffff",
                        "on-primary-container": "#f5fff7",
                        "outline-variant": "#bccac0",
                        "status-success": "#10b981",
                        "surface-tint": "#006c4a",
                        "surface-variant": "#e0e3e5",
                        "map-zone": "rgba(5, 150, 105, 0.2)",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#653e00",
                        "surface-container-low": "#f2f4f6",
                        "on-tertiary-container": "#fffbff",
                        "surface": "#f7f9fb",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "stack-md": "16px",
                        "touch-target": "48px",
                        "gutter": "16px",
                        "stack-lg": "24px",
                        "stack-sm": "8px",
                        "safe-area-bottom": "32px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "caption": ["Inter"],
                        "body-base": ["Inter"],

                    },
                    "fontSize": {
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],

                        "hero-fruit": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }]

                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-margin-mobile">
<!-- Login Container -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-2xl shadow-[0_12px_24px_rgba(0,0,0,0.08)] p-stack-lg flex flex-col gap-stack-lg">
<!-- Logo & Header -->
<header class="text-center flex flex-col items-center gap-stack-sm">
<div class="w-20 h-20 bg-primary-container rounded-xl flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="eco" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary">ReNEW Farm</h1>
<p class="font-body-base text-body-base text-on-surface-variant">Đăng nhập để quản lý trang trại</p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-stack-md">
<!-- Email Input -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface" for="email">Email hoặc Số điện thoại</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">person</span>
</div>
<input class="w-full h-touch-target pl-10 pr-4 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary font-body-base text-body-base text-on-surface placeholder-outline" id="email" name="email" placeholder="Nhập email/SĐT của bạn" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface" for="password">Mật khẩu</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="w-full h-touch-target pl-10 pr-12 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary font-body-base text-body-base text-on-surface placeholder-outline" id="password" name="password" placeholder="Nhập mật khẩu" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary focus:outline-none h-full w-12 justify-center" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="togglePasswordIcon">visibility_off</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Quên mật khẩu?</a>
</div>
<!-- Submit Button -->
<button class="w-full h-touch-target bg-primary text-on-primary rounded-lg font-headline-md text-headline-md flex items-center justify-center gap-2 mt-2 hover:bg-on-primary-fixed-variant transition-colors shadow-sm" type="submit">
                Đăng nhập
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<footer class="mt-4 pt-stack-md border-t border-outline-variant/30 text-center flex flex-col gap-stack-sm">
<p class="font-body-base text-body-base text-on-surface-variant">Gặp sự cố khi đăng nhập?</p>
<a class="font-label-md text-label-md text-primary flex items-center justify-center gap-1 hover:underline" href="#">
<span class="material-symbols-outlined text-[18px]">support_agent</span>
                Liên hệ Quản trị viên
            </a>
</footer>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePasswordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
